`<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1> Expense Tracker</h1>
        
        <div class="balance-container">
            <h3>Total Expenses</h3>
            <h2 id="total-amount">$0.00</h2>
        </div>

        <form id="expense-form">
            <div class="form-control">
                <label for="text">Expense Name</label>
              <input type="text" id="expense-name" placeholder="e.g., Groceries, Internet bill..." required />
            </div>
            <div class="form-control">
                <label for="amount">Amount ($)</label>
                <input type="number" id="expense-amount" placeholder="0.00" step="0.01" required />
            </div>
            <div class="form-control">
                <label for="category">Category</label>
                <select id="expense-category">
                    <option value="Food">Food </option>
                    <option value="Entertainment">Entertainment </option>
                    <option value="Utilities">Utilities </option>
                    <option value="Other">Other </option>
                </select>
            </div>
            <button type="submit" class="btn">Add Expense</button>
        </form>

        <h3>History</h3>
        <ul id="expense-list" class="list">
        </ul>
    </div>

    <script src="app.js"></script>
</body>
</html>
